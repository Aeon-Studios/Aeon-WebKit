<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urban Street Photography - Bold Contemporary</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
    <!-- CUSTOMIZE: Your name -->
    <header class="header">
        <div class="header-content">
            <!-- CUSTOMIZE: Logo -->
            <img src="assets/images/logo.png" alt="Logo" class="logo">
            <nav class="nav">
                <a href="index.html" class="nav-link active">Work</a>
                <a href="gallery.html" class="nav-link">Gallery</a>
                <a href="contact.html" class="nav-link">Contact</a>
            </nav>
        </div>
    </header>

    <!-- Bold Hero -->
    <section class="hero">
        <!-- CUSTOMIZE: Your image -->
        <div class="hero-image" style="background-image: url('assets/images/hero.jpg')"></div>
        <div class="hero-content">
            <h1>URBAN STREETS</h1>
            <p>Capturing City Life</p>
        </div>
    </section>

    <!-- Bio -->
    <section class="bio">
        <div class="container">
            <!-- CUSTOMIZE: Your bio -->
            <p class="bio-text">
                Exploring the raw energy of urban environments. Bold compositions. 
                High contrast. Real moments in the city.
            </p>
        </div>
    </section>

    <!-- Themes -->
    <section class="themes">
        <div class="container">
            <!-- CUSTOMIZE: Your themes -->
            <div class="theme-tags">
                <span class="tag">Street</span>
                <span class="tag">Urban</span>
                <span class="tag">Architecture</span>
                <span class="tag">City Life</span>
            </div>
        </div>
    </section>

    <!-- Gallery Preview -->
    <section class="gallery-preview">
        <div class="gallery-grid">
            <!-- CUSTOMIZE: Urban photos -->
            <div class="gallery-item">
                <img src="assets/images/urban-1.jpg" alt="Urban">
            </div>
            <div class="gallery-item">
                <img src="assets/images/urban-2.jpg" alt="Urban">
            </div>
            <div class="gallery-item">
                <img src="assets/images/urban-3.jpg" alt="Urban">
            </div>
            <div class="gallery-item">
                <img src="assets/images/urban-4.jpg" alt="Urban">
            </div>
        </div>
    </section>

    <!-- CTA -->
    <section class="cta">
        <div class="container">
            <a href="gallery.html" class="button">See Full Collection</a>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <!-- CUSTOMIZE: Social -->
        <div class="footer-content">
            <div class="social-links">
                <a href="#">Instagram</a>
                <a href="#">Contact</a>
            </div>
            <p>Built with Aeon WebTemplates</p>
        </div>
    </footer>

    <script src="assets/js/script.js"></script>
</body>
</html>
