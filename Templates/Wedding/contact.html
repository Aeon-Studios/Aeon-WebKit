<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <header class="header"><nav class="nav"><a href="index.html">Home</a><a href="gallery.html">Gallery</a><a href="contact.html" class="active">Contact</a></nav></header>
    <section class="contact"><div class="container"><h1>Inquire About Your Wedding</h1><form class="contact-form" action="mailto:weddings@example.com" method="post" enctype="text/plain"><div class="form-group"><label for="name">Name</label><input type="text" id="name" name="name" required></div><div class="form-group"><label for="email">Email</label><input type="email" id="email" name="email" required></div><div class="form-group"><label for="date">Wedding Date</label><input type="date" id="date" name="date"></div><div class="form-group"><label for="message">Tell us about your vision</label><textarea id="message" name="message" rows="5" required></textarea></div><button type="submit" class="submit-btn">Send Inquiry</button></form></div></section>
    <footer class="footer"><p>Built with Aeon WebTemplates</p></footer>
    <script src="assets/js/script.js"></script>
</body>
