<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Light Photography - Clean Editorial</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Poppins:wght@300&display=swap" rel="stylesheet">
</head>
<body>
    <!-- CUSTOMIZE: Update photographer name -->
    <header class="header">
        <div class="header-content">
            <div class="branding">
                <!-- CUSTOMIZE: Add your logo -->
                <img src="assets/images/logo.svg" alt="Logo" class="logo">
            </div>
            <nav class="nav">
                <a href="index.html" class="nav-link active">Home</a>
                <a href="gallery.html" class="nav-link">Gallery</a>
                <a href="contact.html" class="nav-link">Contact</a>
            </nav>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <!-- CUSTOMIZE: Your name -->
            <h1 class="title">Minimal Photography</h1>
            <p class="subtitle">Editorial & Lifestyle</p>
        </div>
        <!-- CUSTOMIZE: Your best image -->
        <img src="assets/images/hero.jpg" alt="Hero" class="hero-image">
    </section>

    <!-- Bio Section -->
    <section class="bio-section">
        <div class="container">
            <!-- CUSTOMIZE: Your biography -->
            <p class="bio-text">
                Capturing clean, minimal moments with editorial precision. 
                Each photograph tells a story through simplicity and light.
            </p>
        </div>
    </section>

    <!-- Gallery Preview -->
    <section class="gallery-preview">
        <div class="gallery-grid">
            <!-- CUSTOMIZE: Replace with your images -->
            <div class="gallery-item">
                <img src="assets/images/photo-1.jpg" alt="Portfolio">
            </div>
            <div class="gallery-item">
                <img src="assets/images/photo-2.jpg" alt="Portfolio">
            </div>
            <div class="gallery-item">
                <img src="assets/images/photo-3.jpg" alt="Portfolio">
            </div>
            <div class="gallery-item">
                <img src="assets/images/photo-4.jpg" alt="Portfolio">
            </div>
        </div>
    </section>

    <!-- CTA -->
    <section class="cta-section">
        <a href="gallery.html" class="button">See Full Work</a>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <!-- CUSTOMIZE: Your social links -->
        <div class="footer-links">
            <a href="#">Instagram</a>
            <a href="#">Email</a>
            <a href="#">Contact</a>
        </div>
        <p>Built with Aeon WebTemplates</p>
    </footer>

    <script src="assets/js/script.js"></script>
</body>
</html>
